name: release-please
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_as:
        description: "Force release as version (optional)"
        required: false
        type: string
      skip_pr:
        description: "Skip creating a Release PR (tag/release directly)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          release-as: ${{ inputs.release_as }}
          skip-github-pull-request: ${{ inputs.skip_pr }}

      - name: Open SNAPSHOT bump PR (java)
        if: ${{ steps.rp.outputs.release_created == 'true' }}
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main

  publish:
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Sources at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Check required secrets
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          missing=0
          for v in PUBLISH_TOKEN CERTIFICATE_CHAIN PRIVATE_KEY; do
            # PRIVATE_KEY_PASSWORD is optional (only for encrypted keys)
            if [ -z "$(printenv $v)" ]; then
              echo "::error::$v is missing (configure Actions secret)";
              missing=1;
            fi
          done
          if [ -z "${PRIVATE_KEY_PASSWORD}" ]; then
            echo "::notice::PRIVATE_KEY_PASSWORD not set (assumes unencrypted key).";
          fi
          if [ "$missing" = "1" ]; then exit 1; fi

      - name: Extract version (strip leading \"v\")
        id: v
        shell: bash
        run: |
          RAW="${{ needs.release.outputs.tag_name }}"
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Publish Plugin to Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          ./gradlew publishPlugin --no-daemon --stacktrace --info

      - name: Upload Release Asset (zip)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag_name }}" ./build/distributions/*
